name: BEN Auto Post AI

on:
  schedule:
    - cron: '0 5 * * *'
    - cron: '30 11 * * *'
  workflow_dispatch:

jobs:
  autopost:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run AI Affiliate Engine
        run: python app.py
        env:
          PAGE_ID: ${{ secrets.PAGE_ID }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          SHOPEE_CSV_URL: ${{ secrets.SHOPEE_CSV_URL }}
          SHOPEE_AFFILIATE_ID: ${{ secrets.SHOPEE_AFFILIATE_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MONTHLY_PROMO_TEXT: ${{ secrets.MONTHLY_PROMO_TEXT }}

      - name: Commit state update
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add state.json || true
          git commit -m "update state" || true
          git push
