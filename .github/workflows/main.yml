name: fb-autopost

on:
  schedule:
    - cron: '0 2 * * *'    # 09:00 ไทย
    - cron: '0 5 * * *'    # 12:00 ไทย
    - cron: '30 11 * * *'  # 18:30 ไทย
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install
        run: pip install -r requirements.txt

      - name: Run bot
        run: python app.py
        env:
          PAGE_ID: ${{ secrets.PAGE_ID }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          SHOPEE_CSV_URL: ${{ secrets.SHOPEE_CSV_URL }}

      - name: Commit history
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@bot.com"
          git add posted.json
          git commit -m "update history" || echo "no change"
          git push
