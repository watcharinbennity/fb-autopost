name: Facebook Autopost

on:
  schedule:
    # GitHub cron ใช้เวลา UTC
    # ไทย (UTC+7) 12:00  => UTC 05:00
    - cron: "0 5 * * *"
    # ไทย (UTC+7) 18:30  => UTC 11:30
    - cron: "30 11 * * *"
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests pandas

      - name: Run autopost
        env:
          PAGE_ID: ${{ secrets.PAGE_ID }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          SHOPEE_CSV_URL: ${{ secrets.SHOPEE_CSV_URL }}
          TZ: Asia/Bangkok
          POSTS_PER_RUN: "3"
          TOP_POOL: "200"
          REPOST_AFTER_DAYS: "14"
        run: |
          python app.py
