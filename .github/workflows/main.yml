name: BEN Auto Post V35

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"
    - cron: "30 11 * * *"

permissions:
  contents: write

jobs:
  autopost:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run V35 Hybrid
        env:
          PAGE_ID: ${{ secrets.PAGE_ID }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          SHOPEE_AFFILIATE_ID: ${{ secrets.SHOPEE_AFFILIATE_ID }}
          SHOPEE_CSV_URL: ${{ secrets.SHOPEE_CSV_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MONTHLY_PROMO_TEXT: ${{ secrets.MONTHLY_PROMO_TEXT }}
        run: python -u app.py

      - name: Commit state update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "update state"
          git push
