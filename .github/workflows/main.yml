name: fb-autopost

on:
  schedule:
    # ไทย 12:00 (UTC+7) = UTC 05:00
    - cron: "0 5 * * *"
    # ไทย 18:30 (UTC+7) = UTC 11:30
    - cron: "30 11 * * *"
  workflow_dispatch:

# กัน run ซ้อนแล้วโดน cancel -> "Error: The operation was canceled."
concurrency:
  group: fb-autopost
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run autopost
        env:
          PAGE_ID: ${{ secrets.PAGE_ID }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          SHOPEE_CSV_URL: ${{ secrets.SHOPEE_CSV_URL }}

          TZ: Asia/Bangkok
          POSTS_PER_RUN: "1"
          TOP_POOL: "120"
          REPOST_AFTER_DAYS: "14"
          STATE_FILE: "state.json"

          BRAND: "BEN Home & Electrical"
          CAPTION_STYLE: "short"
          HASHTAGS: "#BENHomeAndElectrical #ของใช้ในบ้าน #อุปกรณ์ไฟฟ้า #ดีลดี #Shopee"

          # คัดหมวดให้ตรงเพจ (ผ่าน/ไม่ผ่าน)
          ALLOW_KEYWORDS: "ปลั๊ก|ปลั๊กพ่วง|ปลั๊กไฟ|สายไฟ|หลอดไฟ|โคมไฟ|ไฟเพดาน|ไฟติดผนัง|พัดลม|สวิตช์|เบรกเกอร์|ตู้ไฟ|อะแดปเตอร์|หัวชาร์จ|สายชาร์จ|USB|รางปลั๊ก|ไฟฉาย|แบต|ถ่าน|เครื่องมือ|สว่าน|ไขควง|คีม|เทปพันสาย|กาว|ซิลิโคน|จัดเก็บ|ชั้นวาง|กล่อง|ครัว|ทำความสะอาด|ไม้ถู|ฟองน้ำ|น้ำยาล้างจาน|ถุงขยะ"
          BLOCK_KEYWORDS: "แชมพู|ครีม|อาหารเสริม|บุหรี่ไฟฟ้า|ยา|การพนัน|เซ็กซ์|18\\+"
        run: python -u app.py
