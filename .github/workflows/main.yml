name: AUTO-POST

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'
    - cron: '0 5 * * *'
    - cron: '30 11 * * *'
    - cron: '0 14 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          TZ: Asia/Bangkok
          PAGE_ID: ${{ secrets.PAGE_ID }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          PAGE_ID_2: ${{ secrets.PAGE_ID_2 }}
          PAGE_ACCESS_TOKEN_2: ${{ secrets.PAGE_ACCESS_TOKEN_2 }}
          SHOPEE_CSV_URL: ${{ secrets.SHOPEE_CSV_URL }}
          SHOPEE_AFFILIATE_ID: ${{ secrets.SHOPEE_AFFILIATE_ID }}
          SHOPEE_SUB_ID_PREFIX: "fbbot"
          SHORTENER_BASE_URL: "https://ben-shortener.bennity.workers.dev"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: "gpt-4o-mini"
          USE_OPENAI: "true"
          AUTO_REPLY_COMMENTS: "true"
          COMMENT_SCAN_LIMIT: "20"
          MAX_REPLY_PER_RUN: "5"
        run: python app.py

      - name: Commit posted history
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add posted.json replied_comments.json
          git diff --cached --quiet || git commit -m "update bot history"
          git push
