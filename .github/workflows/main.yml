name: BEN AUTO POST

on:
  schedule:
    - cron: "0 5 * * *"
    - cron: "30 11 * * *"

  workflow_dispatch:

jobs:
  autopost:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests openai

      - run: python app.py

      - name: save state
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@bot.com"
          git add state.json
          git commit -m "update state" || exit 0
          git push
