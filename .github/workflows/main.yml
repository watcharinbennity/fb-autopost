name: fb-autopost

on:
  workflow_dispatch:
  schedule:
    - cron: "15 5 * * *"   # 12:15 Asia/Bangkok
    - cron: "30 11 * * *"  # 18:30 Asia/Bangkok

concurrency:
  group: fb-autopost
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Auto Post
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          POSTS_FILE: posts.json
          STATE_FILE: state.json
          TZ: Asia/Bangkok
        run: |
          python app.py

      - name: Commit state.json back to repo
        run: |
          if git status --porcelain | grep -q "state.json"; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update state.json"
            git push
          else
            echo "No state.json changes."
          fi
