name: fb-autopost

on:
  schedule:
    - cron: "0 5 * * *"    # 12:00 TH
    - cron: "30 11 * * *"  # 18:30 TH
    - cron: "0 14 * * *"   # 21:00 TH
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Auto Pro
        env:
          TZ: Asia/Bangkok
          STATE_FILE: state.json

          GRAPH_VERSION: v25.0

          PAGE_ID: ${{ secrets.PAGE_ID }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          SHOPEE_CSV_URL: ${{ secrets.SHOPEE_CSV_URL }}

          POSTS_PER_RUN: "3"
          TOP_POOL: "250"
          REPOST_AFTER_DAYS: "14"

          BRAND: "BEN Home & Electrical"
          CAPTION_STYLE: "short"
          HASHTAGS: "#BENHomeAndElectrical #ของใช้ในบ้าน #อุปกรณ์ไฟฟ้า #ดีลดี #Shopee #ลดราคา"

          REQUIRE_IMAGE: "1"

          MIN_RATING: "4.6"
          MIN_DISCOUNT_PCT: "10"
          MIN_SOLD: "50"
          REQUIRE_COUPON: "0"

          ALLOW_KEYWORDS: ""
          BLOCK_KEYWORDS: ""
        run: |
          python app.py

      - name: Commit state.json back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git commit -m "Update state" || echo "No changes"
          git push
