name: BEN Ultra Affiliate Engine

on:
 workflow_dispatch:

 schedule:
  - cron: "0 1 * * *"
  - cron: "0 2 * * *"
  - cron: "0 3 * * *"
  - cron: "0 5 * * *"
  - cron: "0 7 * * *"
  - cron: "0 9 * * *"
  - cron: "0 11 * * *"
  - cron: "0 13 * * *"
  - cron: "0 15 * * *"
  - cron: "0 17 * * *"
  - cron: "0 18 * * *"
  - cron: "0 19 * * *"
  - cron: "0 20 * * *"
  - cron: "0 21 * * *"
  - cron: "0 22 * * *"
  - cron: "0 23 * * *"

permissions:
 contents: write

jobs:
 autopost:

  runs-on: ubuntu-latest

  steps:

   - uses: actions/checkout@v4

   - uses: actions/setup-python@v5
     with:
      python-version: "3.11"

   - run: pip install -r requirements.txt

   - name: run bot
     env:
      PAGE_ID: ${{ secrets.PAGE_ID }}
      PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
      SHOPEE_AFFILIATE_ID: ${{ secrets.SHOPEE_AFFILIATE_ID }}
      SHOPEE_CSV_URL: ${{ secrets.SHOPEE_CSV_URL }}

     run: python app.py

   - name: save state
     run: |
      git config user.name github-actions
      git config user.email actions@github.com
      git add state.json
      git commit -m "update state" || echo "no change"
      git push
