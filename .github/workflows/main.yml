name: FB Auto Post

on:
  workflow_dispatch:
  schedule:
    # เวลาไทย 09:00
    - cron: '0 2 * * *'
    # เวลาไทย 12:00
    - cron: '0 5 * * *'
    # เวลาไทย 18:30
    - cron: '30 11 * * *'
    # เวลาไทย 21:00
    - cron: '0 14 * * *'

permissions:
  contents: write

jobs:
  runbot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot
        env:
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          PAGE_ID: ${{ secrets.PAGE_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SHOPEE_AFFILIATE_ID: ${{ secrets.SHOPEE_AFFILIATE_ID }}
          SHOPEE_SITE: shopee.co.th
        run: python -u app.py

      - name: Save logs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add products.json || true
          git add posted_products.json || true
          git add post_log.json || true
          git add reels_script.txt || true

          git diff --cached --quiet || git commit -m "update bot logs"
          git push || echo "no change"
