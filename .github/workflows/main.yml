name: BEN Auto Post V40

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"
    - cron: "30 11 * * *"

permissions:
  contents: write

jobs:
  autopost:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          pip install -r requirements.txt

      - name: Run Bot
        env:
          PAGE_ID: ${{ secrets.PAGE_ID }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          SHOPEE_AFFILIATE_ID: ${{ secrets.SHOPEE_AFFILIATE_ID }}
          SHOPEE_CSV_URL: ${{ secrets.SHOPEE_CSV_URL }}
        run: python app.py

      - name: Save State
        run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add state.json
          git commit -m "update state" || echo "no change"
          git push
