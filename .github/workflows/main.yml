name: post

on:
  schedule:
    - cron: "15 5 * * *"   # 12:15 Thailand (UTC+7)
    - cron: "30 11 * * *"  # 18:30 Thailand (UTC+7)
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Auto Post (1 post)
        env:
          PAGE_ID: ${{ secrets.PAGE_ID }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          SHOPEE_CSV_URL: ${{ secrets.SHOPEE_CSV_URL }}
        run: |
          python app.py

      - name: Commit state.json back to repo
        run: |
          if [ -f state.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "Update state" || echo "No changes"
            git push || echo "No push"
          else
            echo "state.json not found, skip commit"
          fi
