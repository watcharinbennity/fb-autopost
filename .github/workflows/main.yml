name: BEN AUTO POST

on:

  workflow_dispatch:

  schedule:
    - cron: "0 */2 * * *"

permissions:
  contents: write

jobs:

  autopost:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: run bot
        env:
          PAGE_ID: ${{ secrets.PAGE_ID }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          SHOPEE_CSV_URL: ${{ secrets.SHOPEE_CSV_URL }}
          SHOPEE_AFFILIATE_ID: ${{ secrets.SHOPEE_AFFILIATE_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python app.py

      - name: save state
        run: |
          git config user.name bot
          git config user.email bot@bot.com
          git add state.json
          git commit -m update || echo ok
          git push
