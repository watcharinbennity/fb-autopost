name: BEN AUTO POST

on:
 schedule:
  - cron: "0 * * * *"
 workflow_dispatch:

jobs:
 autopost:

  runs-on: ubuntu-latest

  steps:

   - uses: actions/checkout@v4

   - uses: actions/setup-python@v5
     with:
      python-version: "3.11"

   - run: pip install -r requirements.txt

   - name: run bot
     env:
      PAGE_ID: ${{ secrets.PAGE_ID }}
      PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
      SHOPEE_CSV_URL: ${{ secrets.SHOPEE_CSV_URL }}
      SHOPEE_AFFILIATE_ID: ${{ secrets.SHOPEE_AFFILIATE_ID }}

     run: python app.py
