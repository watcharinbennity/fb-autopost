name: BEN-SMART ULTRA

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'
    - cron: '0 5 * * *'
    - cron: '30 11 * * *'
    - cron: '0 14 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Run bot
        env:
          TZ: Asia/Bangkok
          PAGE_ID: ${{ secrets.PAGE_ID }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          PAGE_ID_2: ${{ secrets.PAGE_ID_2 }}
          PAGE_ACCESS_TOKEN_2: ${{ secrets.PAGE_ACCESS_TOKEN_2 }}
          SHOPEE_CSV_URL: ${{ secrets.SHOPEE_CSV_URL }}
        run: python app.py
