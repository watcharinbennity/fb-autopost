name: BEN-SMARTHOME-ULTRA

on:
  schedule:
    - cron: "0 2 * * *"      # 09:00 ไทย
    - cron: "0 5 * * *"      # 12:00 ไทย
    - cron: "30 11 * * *"    # 18:30 ไทย
    - cron: "0 14 * * *"     # 21:00 ไทย
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run ultra bot
        env:
          PAGE_ID: ${{ secrets.PAGE_ID }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          PAGE_ID_2: ${{ secrets.PAGE_ID_2 }}
          PAGE_ACCESS_TOKEN_2: ${{ secrets.PAGE_ACCESS_TOKEN_2 }}
          SHOPEE_CSV_URL: ${{ secrets.SHOPEE_CSV_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: "gpt-4o-mini"
          USE_OPENAI: "true"
        run: python app.py

      - name: Commit posted files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add posted_ben.json posted_smart.json || true
          git diff --cached --quiet || git commit -m "update posted history"
          git push
