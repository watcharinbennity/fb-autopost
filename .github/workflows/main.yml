name: Auto Post (V41 ULTRA)

on:
  workflow_dispatch:
  schedule:
    - cron: "30 1 * * *"   # 08:30 BKK
    - cron: "0 5 * * *"    # 12:00 BKK
    - cron: "0 8 * * *"    # 15:00 BKK
    - cron: "30 11 * * *"  # 18:30 BKK
    - cron: "30 14 * * *"  # 21:30 BKK

concurrency:
  group: autopost
  cancel-in-progress: false

jobs:
  autopost:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run V41 ULTRA
        env:
          GRAPH_VERSION: v25.0
          PAGE_ID: ${{ secrets.PAGE_ID }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          SHOPEE_CSV_URL: ${{ secrets.SHOPEE_CSV_URL }}
          SHOPEE_AFFILIATE_ID: ${{ secrets.SHOPEE_AFFILIATE_ID }}

          # 5 โพส/วัน (แต่ละครั้งรัน 1 โพส)
          POSTS_MAX_PER_RUN: "1"
          SLOTS_BKK: "08:30,12:00,15:00,18:30,21:30"

          # บังคับโพสครั้งแรกให้เห็นผลทันที
          FIRST_RUN_POST_1: "1"
          FORCE_POST: "0"

          # กรองของให้ตรงเพจ
          STRICT_PAGE_MATCH: "1"
          MIN_RATING: "4.7"
          MIN_DISCOUNT_PCT: "15"
          MIN_SOLD: "50"
          PRICE_MIN: "59"
          PRICE_MAX: "4999"
          REPOST_AFTER_DAYS: "21"
          POST_IMAGES_COUNT: "3"

          AFF_UTM_SOURCE: "facebook"
          AFF_TAG: "BENHomeElectrical"
          BRAND: "BEN Home & Electrical"
          HASHTAGS: "#BENHomeElectrical #ของใช้ในบ้าน #อุปกรณ์ไฟฟ้า #เครื่องมือช่าง #งานช่าง #ซ่อมบ้าน #ShopeeAffiliate"

          SLOT_WINDOW_MINUTES: "12"
        run: |
          echo "INFO: start $(date -u)"
          python app.py
