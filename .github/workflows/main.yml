name: FB Auto Post

on:
  workflow_dispatch:

  schedule:
    - cron: '0 2 * * *'     # 09:00 ไทย
    - cron: '0 5 * * *'     # 12:00 ไทย
    - cron: '0 8 * * *'     # 15:00 ไทย
    - cron: '30 11 * * *'   # 18:30 ไทย
    - cron: '0 14 * * *'    # 21:00 ไทย

permissions:
  contents: write

jobs:

  runbot:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: run bot
        env:
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          PAGE_ID: ${{ secrets.PAGE_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SHOPEE_CSV_URL: ${{ secrets.SHOPEE_CSV_URL }}
        run: python app.py
