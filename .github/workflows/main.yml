name: Auto Post

on:
  schedule:
    - cron: "0 1 * * *"
    - cron: "0 5 * * *"
    - cron: "30 11 * * *"
    - cron: "30 14 * * *"
  workflow_dispatch:

jobs:
  autopost:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Run Bot
        env:
          GRAPH_VERSION: "v25.0"
          PAGE_ID: ${{ secrets.PAGE_ID }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          SHOPEE_CSV_URL: ${{ secrets.SHOPEE_CSV_URL }}
          SHOPEE_AFFILIATE_ID: "15328100363"

        run: python app.py
