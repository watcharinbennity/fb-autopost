name: Auto Post V120

on:
  workflow_dispatch:

  schedule:
    - cron: "30 1 * * *"
    - cron: "0 5 * * *"
    - cron: "0 8 * * *"
    - cron: "30 11 * * *"
    - cron: "30 14 * * *"

jobs:
  autopost:

    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ติดตั้ง ffmpeg
      - name: install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      # ติดตั้ง python packages
      - name: install deps
        run: pip install requests moviepy

      - name: run bot
        env:
          PAGE_ID: ${{ secrets.PAGE_ID }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          SHOPEE_CSV_URL: ${{ secrets.SHOPEE_CSV_URL }}
          SHOPEE_AFFILIATE_ID: ${{ secrets.SHOPEE_AFFILIATE_ID }}
        run: python app.py
