name: FB Auto Post

on:
  workflow_dispatch:

  schedule:

    - cron: '0 2 * * *'
    - cron: '0 5 * * *'
    - cron: '30 11 * * *'
    - cron: '0 14 * * *'

jobs:

  runbot:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - run: pip install -r requirements.txt

    - name: run bot
      env:

        PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
        PAGE_ID: ${{ secrets.PAGE_ID }}

      run: python app.py
