name: fb-autopost

on:
  workflow_dispatch:   # กดรันเองได้
  schedule:
    # วันละ 2 รอบ (เวลาไทย 09:00 และ 18:00)
    # GitHub ใช้เวลา UTC → ไทย +7
    - cron: "0 2 * * *"   # 09:00 ไทย
    - cron: "0 11 * * *"  # 18:00 ไทย

jobs:
  autopost:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run autopost
        env:
          PAGE_ID: ${{ secrets.PAGE_ID }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          SHOPEE_FEED_URL: ${{ secrets.SHOPEE_FEED_URL }}
        run: |
          python app.py
