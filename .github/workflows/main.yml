name: fb-autopost

on:
  schedule:
    # 12:15 ไทย = 05:15 UTC
    - cron: "15 5 * * *"

    # 18:30 ไทย = 11:30 UTC
    - cron: "30 11 * * *"

  # กดรันเองได้
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run Facebook Post
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
        run: node post.js
