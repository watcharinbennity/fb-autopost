name: fb-autopost

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"   # 12:00 Thailand (UTC+7)
    - cron: "30 11 * * *" # 18:30 Thailand (UTC+7)

permissions:
  contents: write

concurrency:
  group: fb-autopost
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run autopost
        env:
          PAGE_ID: ${{ secrets.PAGE_ID }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          SHOPEE_CSV_URL: ${{ secrets.SHOPEE_CSV_URL }}
          REPOST_AFTER_DAYS: "15"
          POSTS_PER_RUN: "2"
        run: python app.py

      - name: Commit state.json (if changed)
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "Update state.json"
            git push
          else
            echo "No changes to commit"
          fi
