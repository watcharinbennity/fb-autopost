name: Auto Post (V39 ULTRA)

on:
  schedule:
    # เวลาไทย 12:00 และ 18:30  (GitHub Actions ใช้ UTC)
    # 12:00 BKK = 05:00 UTC
    # 18:30 BKK = 11:30 UTC
    - cron: "0 5 * * *"
    - cron: "30 11 * * *"
  workflow_dispatch:

jobs:
  autopost:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # (แนะนำ) cache เพื่อลดเวลารัน / เก็บ state.json ข้ามรัน
      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: state.json
          key: state-${{ github.repository }}-${{ github.ref_name }}
          restore-keys: |
            state-${{ github.repository }}-

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run V39 ULTRA
        env:
          GRAPH_VERSION: "v25.0"
          PAGE_ID: ${{ secrets.PAGE_ID }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          SHOPEE_CSV_URL: ${{ secrets.SHOPEE_CSV_URL }}
          SHOPEE_AFFILIATE_ID: ${{ secrets.SHOPEE_AFFILIATE_ID }}

          # เวลาโพสต์ตามเพจ (ไทย)
          SLOTS_BKK: "12:00,18:30"
          POSTS_MAX_PER_RUN: "1"
          FIRST_RUN_POST_1: "1"

          # ✅ แบบ B: ถ้ากด Run เอง (workflow_dispatch) = FORCE_POST=1
          # ถ้ารันตาม schedule = FORCE_POST=0
          FORCE_POST: ${{ github.event_name == 'workflow_dispatch' && '1' || '0' }}

          # คัดของให้ตรงเพจ BEN Home & Electrical
          MIN_RATING: "4.7"
          MIN_DISCOUNT_PCT: "15"
          MIN_SOLD: "50"
          PRICE_MIN: "59"
          PRICE_MAX: "4999"
          REPOST_AFTER_DAYS: "21"
          POST_IMAGES_COUNT: "3"

          AFF_UTM_SOURCE: "facebook"
          AFF_TAG: "BENHomeElectrical"
          BRAND: "BEN Home & Electrical"
          HASHTAGS: "#BENHomeElectrical #ของใช้ในบ้าน #อุปกรณ์ไฟฟ้า #เครื่องมือช่าง #งานช่าง #ซ่อมบ้าน #ShopeeAffiliate"
        run: python app.py

      - name: Save state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: state-${{ github.repository }}-${{ github.ref_name }}
