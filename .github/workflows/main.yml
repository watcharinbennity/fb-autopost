name: Auto Post

on:
  workflow_dispatch:

  schedule:
    - cron: "30 1 * * *"
    - cron: "0 5 * * *"
    - cron: "0 8 * * *"
    - cron: "30 11 * * *"
    - cron: "30 14 * * *"

jobs:
  autopost:

    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - name: run bot
        env:
          PAGE_ID: ${{ secrets.PAGE_ID }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          SHOPEE_CSV_URL: ${{ secrets.SHOPEE_CSV_URL }}
          SHOPEE_AFFILIATE_ID: ${{ secrets.SHOPEE_AFFILIATE_ID }}
        run: python app.py
