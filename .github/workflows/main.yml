name: fb-autopost

on:
  schedule:
    # ไทย 12:00 (UTC+7) = UTC 05:00
    - cron: "0 5 * * *"
    # ไทย 18:30 (UTC+7) = UTC 11:30
    - cron: "30 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fb-autopost
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run autopost
        env:
          PAGE_ID: ${{ secrets.PAGE_ID }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          SHOPEE_CSV_URL: ${{ secrets.SHOPEE_CSV_URL }}

          TZ: Asia/Bangkok
          POSTS_PER_RUN: "1"
          TOP_POOL: "200"
          REPOST_AFTER_DAYS: "14"
          STATE_FILE: "state.json"

          CAPTION_STYLE: "short"
          HASHTAGS: "#BENHomeAndElectrical #ของใช้ในบ้าน #อุปกรณ์ไฟฟ้า #รวมดีล #Shopee"
        run: |
          python app.py

      - name: Commit updated state.json
        run: |
          if git status --porcelain | grep -q "state.json"; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "Update state.json"
            git push
          else
            echo "No state changes to commit."
          fi
