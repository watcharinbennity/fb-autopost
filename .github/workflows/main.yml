name: fb-autopost

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"    # 12:00 Thailand
    - cron: "30 11 * * *"  # 18:30 Thailand

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run autopost
        env:
          PAGE_ID: ${{ secrets.PAGE_ID }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          SHOPEE_CSV_URL: ${{ secrets.SHOPEE_CSV_URL }}
          POSTS_PER_RUN: "1"
          REPOST_AFTER_DAYS: "15"
        run: |
          python app.py

      - name: Commit updated state.json (if changed)
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add state.json || true
          git diff --cached --quiet || git commit -m "Update state.json"
          git push
