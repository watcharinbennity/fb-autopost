name: fb-autopost

on:
  schedule:
    - cron: "0 5 * * *"     # 12:00 Thailand (UTC+7)
    - cron: "30 11 * * *"   # 18:30 Thailand (UTC+7)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run autopost
        env:
          PAGE_ID: ${{ secrets.PAGE_ID }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          SHOPEE_CSV_URL: ${{ secrets.SHOPEE_CSV_URL }}
          POSTS_PER_RUN: ${{ secrets.POSTS_PER_RUN }}
          REPOST_AFTER_DAYS: ${{ secrets.REPOST_AFTER_DAYS }}
          TOP_POOL: ${{ secrets.TOP_POOL }}
        run: python app.py
