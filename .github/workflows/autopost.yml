name: Auto Post

on:
  schedule:
    - cron: "0 2 * * *"    # 09:00 TH
    - cron: "0 5 * * *"    # 12:00 TH
    - cron: "30 11 * * *"  # 18:30 TH
    - cron: "0 14 * * *"   # 21:00 TH
  workflow_dispatch:

jobs:
  autopost:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile app.py

      - name: Run V30 ULTRA FIX
        env:
          GRAPH_VERSION: "v25.0"
          PAGE_ID: ${{ secrets.PAGE_ID }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          SHOPEE_CSV_URL: ${{ secrets.SHOPEE_CSV_URL }}

          # หน้านาย (Shopee Affiliate)
          SHOPEE_AFFILIATE_ID: "15328100363"
          AFF_UTM_SOURCE: "facebook"
          AFF_TAG: "BENHomeElectrical"

          # เวลาโพสต์ (ไทย)
          SLOTS_BKK: "09:00,12:00,18:30,21:00"

          # โพสต์ 1 โพสต์ต่อรัน
          POSTS_MAX_PER_RUN: "1"

          # รับประกันรันครั้งแรกโพสต์ 1
          FIRST_RUN_POST_1: "1"

          # เน้นให้ตรงเพจ (ปรับได้)
          MIN_RATING: "4.6"
          MIN_DISCOUNT_PCT: "10"
          MIN_SOLD: "0"
          PRICE_MIN: "59"
          PRICE_MAX: "4999"
          REPOST_AFTER_DAYS: "14"

          # รูป/วิดีโอ
          POST_IMAGES_COUNT: "3"
          PREFER_VIDEO: "1"
          VIDEO_MAX_MB: "80"

          # แฮชแท็ก
          BRAND: "BEN Home & Electrical"
          HASHTAGS: "#BENHomeElectrical #ของใช้ในบ้าน #อุปกรณ์ไฟฟ้า #เครื่องมือช่าง #งานช่าง #ShopeeAffiliate"
        run: python app.py
