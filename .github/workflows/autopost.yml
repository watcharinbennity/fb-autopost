name: Auto Post

on:
  schedule:
    - cron: "*/15 * * * *"   # รันทุก 15 นาที (UTC)
  workflow_dispatch:
    inputs:
      posts_this_run:
        description: "How many posts this run (default 1)"
        required: false
        default: "1"

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          PAGE_ID: ${{ secrets.PAGE_ID }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          SHOPEE_CSV_URL: ${{ secrets.SHOPEE_CSV_URL }}
          GRAPH_VERSION: "v25.0"

          # ตารางเวลา (เวลาไทย)
          POST_SCHEDULE_BKK: "09:00,12:15,15:30,18:30,21:00"

          # โพสต์ต่อการรัน (แนะนำ 1 เพื่อไม่สแปม)
          POSTS_THIS_RUN: ${{ github.event.inputs.posts_this_run || '1' }}

          # รูปต่อโพสต์
          POST_IMAGES_COUNT: "3"

          # คัดของดี (ปรับได้)
          MIN_RATING: "4.5"
          MIN_DISCOUNT_PCT: "20"
          MIN_IMAGES: "3"
          STREAM_SCAN_ROWS: "30000"     # สแกนสูงสุดกี่แถวจาก CSV (stream)
          PICK_TOP_N: "400"             # เลือกสุ่มจาก top N ที่คัดแล้ว

        run: python -u app.py

      - name: Commit state.json back to repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add state.json || true
          git commit -m "update state" || echo "no changes"
          git push || echo "push skipped"
