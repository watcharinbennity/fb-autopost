name: Auto Post

on:
  schedule:
    # TH 12:15 = UTC 05:15
    - cron: "15 5 * * *"
    # TH 18:30 = UTC 11:30
    - cron: "30 11 * * *"
  workflow_dispatch:

concurrency:
  group: fb-autopost
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Auto Post (1 post)
        env:
          PAGE_ID: ${{ secrets.PAGE_ID }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          SHOPEE_CSV_URL: ${{ secrets.SHOPEE_CSV_URL }}

          POST_IMAGES_COUNT: "3"        # 3 รูปต่อสินค้า
          END_MONTH_BOOST_DAYS: "5"     # โหมดปลายเดือน (5 วันท้ายเดือน)
          DOUBLE_DAY_BOOST: "1"         # วันเลขเบิ้ล 3/3,4/4...
          COMMENT_LINK: "1"             # คอมเมนต์ลิงก์เพิ่ม Reach
          DRY_RUN: "0"                  # 1=ไม่โพสต์จริง (เทส)
        run: python -u app.py

      - name: Commit state.json back to repo
        run: |
          if [ -f state.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "Update state.json" || echo "No changes"
            git push || echo "No push"
          fi
