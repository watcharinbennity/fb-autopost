name: Auto Post

on:
  schedule:
    - cron: "0 2 * * *"
    - cron: "15 5 * * *"
    - cron: "30 8 * * *"
    - cron: "30 11 * * *"
    - cron: "0 14 * * *"
    - cron: "30 15 * * *"
  workflow_dispatch:

jobs:
  autopost:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Run AI SALES ENGINE
        env:
          GRAPH_VERSION: "v25.0"
          PAGE_ID: ${{ secrets.PAGE_ID }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          SHOPEE_CSV_URL: ${{ secrets.SHOPEE_CSV_URL }}
          AFFILIATE_ID: ${{ secrets.AFFILIATE_ID }}

        run: python app.py
