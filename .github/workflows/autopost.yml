name: Auto Post

on:
  schedule:
    - cron: "0 2 * * *"    # 09:00 BKK
    - cron: "15 5 * * *"   # 12:15 BKK
    - cron: "30 8 * * *"   # 15:30 BKK
    - cron: "30 11 * * *"  # 18:30 BKK
    - cron: "0 14 * * *"   # 21:00 BKK
  workflow_dispatch:
    inputs:
      posts_this_run:
        description: "How many posts this run"
        required: false
        default: "1"

concurrency:
  group: autopost-${{ github.ref }}
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Auto Post (V16)
        env:
          GRAPH_VERSION: "v25.0"
          PAGE_ID: ${{ secrets.PAGE_ID }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          SHOPEE_CSV_URL: ${{ secrets.SHOPEE_CSV_URL }}

          # Optional tuning
          POST_IMAGES_COUNT: "3"
          END_MONTH_BOOST_DAYS: "3"
          POSTS_THIS_RUN: ${{ github.event.inputs.posts_this_run || '1' }}

          # Filtering (ขายง่าย)
          MIN_RATING: "4.6"
          MIN_DISCOUNT_PCT: "15"
          MIN_SOLD: "50"
          PRICE_MIN: "79"
          PRICE_MAX: "1999"

          # CSV streaming limits
          STREAM_MAX_ROWS: "250000"   # กันยาวเกินไป
          TOPK_POOL: "200"            # เก็บของคะแนนดีไว้สุ่ม
        run: python -u app.py

      - name: Commit state.json back to repo
        run: |
          if [ -f state.json ]; then
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git add state.json
            git commit -m "update state" || echo "No changes"
            git push || echo "Push skipped"
          fi
