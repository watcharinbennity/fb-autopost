name: Auto Post

on:
  schedule:
    - cron: "15 5 * * *"   # 12:15 TH
    - cron: "30 11 * * *"  # 18:30 TH
  workflow_dispatch:

concurrency:
  group: fb-autopost
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Run Auto Post
        env:
          PAGE_ID: ${{ secrets.PAGE_ID }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          SHOPEE_CSV_URL: ${{ secrets.SHOPEE_CSV_URL }}

          # โหดสุดปรับได้ (ไม่ใส่ก็ใช้ default)
          POST_IMAGES_COUNT: "5"
          END_MONTH_BOOST_DAYS: "3"
        run: python app.py

      - name: Commit state.json back to repo
        run: |
          git config user.name "fb-autopost-bot"
          git config user.email "fb-autopost-bot@users.noreply.github.com"
          git add state.json || true
          git commit -m "update state" || true
          git push || true
