name: Auto Post

on:
  schedule:
    - cron: "0 5 * * *"     # 12:00 TH
    - cron: "30 11 * * *"   # 18:30 TH
  workflow_dispatch:

jobs:
  autopost:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Run V30 ULTRA TH
        env:
          GRAPH_VERSION: "v25.0"
          PAGE_ID: ${{ secrets.PAGE_ID }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          SHOPEE_CSV_URL: ${{ secrets.SHOPEE_CSV_URL }}

          # Affiliate (ของคุณ)
          SHOPEE_AFFILIATE_ID: "15328100363"
          AFF_UTM_SOURCE: "facebook"
          AFF_TAG: "BENHomeElectrical"

          # รันครั้งแรกโพสต์ 1 แน่นอน
          FIRST_RUN_POST_1: "1"

          # ถ้ากดรันเองจะให้โพสต์ทันที ตั้งเป็น 1
          FORCE_POST: "0"

          # slot เวลาไทย (แก้ได้)
          SLOTS_BKK: "12:00,18:30,21:00"

          # จำกัด 1 โพสต์ต่อ run (แนะนำเพื่อความปลอดภัย)
          POSTS_MAX_PER_RUN: "1"
        run: python app.py
