name: Auto Post

on:
  schedule:
    # เวลาไทย (BKK, UTC+7)
    # 12:15 BKK = 05:15 UTC
    - cron: "15 5 * * *"
    # 18:30 BKK = 11:30 UTC
    - cron: "30 11 * * *"

  workflow_dispatch:
    inputs:
      posts:
        description: "How many posts this run"
        required: false
        default: "1"

concurrency:
  group: autopost
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Auto Post
        env:
          PAGE_ID: ${{ secrets.PAGE_ID }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          SHOPEE_CSV_URL: ${{ secrets.SHOPEE_CSV_URL }}
          POSTS: ${{ github.event.inputs.posts || '1' }}

          # ปรับได้
          POST_IMAGES_COUNT: "3"
          END_MONTH_BOOST_DAYS: "3"
          GRAPH_VERSION: "25.0"
        run: python -u app.py

      - name: Commit state.json back to repo
        run: |
          if [ -f state.json ]; then
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git add state.json
            git commit -m "Update state.json" || echo "No changes"
            git push || echo "No push"
          else
            echo "state.json not found, skip"
          fi
