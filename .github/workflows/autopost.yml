name: Auto Post

on:
  schedule:
    - cron: "*/15 * * * *"   # รันทุก 15 นาที (UTC) แล้วให้ app.py เช็คเวลาเอง + catch-up
  workflow_dispatch:

jobs:
  autopost:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Run V30 ULTRA
        env:
          GRAPH_VERSION: "v25.0"
          PAGE_ID: ${{ secrets.PAGE_ID }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          SHOPEE_CSV_URL: ${{ secrets.SHOPEE_CSV_URL }}

          # หน้านาย (Shopee Affiliate)
          SHOPEE_AFFILIATE_ID: "15328100363"
          AFF_UTM_SOURCE: "facebook"
          AFF_TAG: "BENHomeElectrical"

          # เวลาโพสต์ (เวลาไทย)
          SLOTS_BKK: "07:30,09:00,12:00,16:30,18:30,21:00"

          # กติกา
          FIRST_RUN_POST_1: "1"
          POSTS_MAX_PER_RUN: "2"
          MIN_RATING: "4.6"
          MIN_DISCOUNT_PCT: "10"
          MIN_SOLD: "30"
          PRICE_MIN: "59"
          PRICE_MAX: "4999"
          REPOST_AFTER_DAYS: "14"

          # เน้นหมวดเพจ
          ALLOW_KEYWORDS: "(ไฟฟ้า|ปลั๊ก|ปลั๊กพ่วง|สายไฟ|เบรกเกอร์|ตู้ไฟ|หลอดไฟ|โคม|สวิตช์|เต้ารับ|มิเตอร์|UPS|แบตเตอรี่|LiFePO4|อินเวอร์เตอร์|โซล่า|ชาร์จ|เครื่องมือ|สว่าน|ค้อน|ประแจ|คีม|ไขควง|เทปพันสาย|DIY|ซ่อมบ้าน|งานช่าง)"
          BLOCK_KEYWORDS: "(ครีม|เครื่องสำอาง|บำรุงผิว|ย้อมผม|วิกผม|เสื้อผ้า|รองเท้า|กระเป๋า|ชุดนอน|ผ้าห่ม|หมอน|อาหารเสริม|บุหรี่|แอลกอฮอล์|18\\+)"

          BRAND: "BEN Home & Electrical"
          HASHTAGS: "#BENHomeElectrical #ของใช้ในบ้าน #อุปกรณ์ไฟฟ้า #เครื่องมือช่าง #งานช่าง #ซ่อมบ้าน #ShopeeAffiliate"
        run: python app.py
