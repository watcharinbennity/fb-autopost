name: Auto Post

on:
  schedule:
    # TH 12:15 = UTC 05:15
    - cron: "15 5 * * *"
    # TH 18:30 = UTC 11:30
    - cron: "30 11 * * *"
  workflow_dispatch:

concurrency:
  group: fb-autopost
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ✅ เพิ่ม step ตรวจ CSV ก่อน (จะรู้ทันทีว่า URL ใช้ได้ไหม)
      - name: Debug CSV URL (headers + first bytes)
        env:
          SHOPEE_CSV_URL: ${{ secrets.SHOPEE_CSV_URL }}
        run: |
          echo "Checking CSV URL..."
          curl -I -L --max-time 30 "$SHOPEE_CSV_URL" || true
          echo "Downloading first 2KB..."
          curl -L --max-time 30 "$SHOPEE_CSV_URL" | head -c 2048 || true
          echo ""

      - name: Run Auto Post (1 post)
        env:
          PAGE_ID: ${{ secrets.PAGE_ID }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          SHOPEE_CSV_URL: ${{ secrets.SHOPEE_CSV_URL }}

          POST_IMAGES_COUNT: "3"
          END_MONTH_BOOST_DAYS: "5"
          DOUBLE_DAY_BOOST: "1"
          COMMENT_LINK: "1"
          DRY_RUN: "0"

          # ✅ เพิ่มค่าความทนเวลาโหลด CSV
          CSV_TIMEOUT: "25"
          CSV_RETRIES: "5"
          CSV_RETRY_SLEEP: "4"
        run: python -u app.py

      - name: Commit state.json back to repo
        run: |
          if [ -f state.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "Update state.json" || echo "No changes"
            git push || echo "No push"
          fi
