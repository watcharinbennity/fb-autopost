name: Auto Post

on:
  schedule:
    - cron: "15 5 * * *"
    - cron: "30 11 * * *"
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Run Post
        env:
          PAGE_ID: ${{ secrets.PAGE_ID }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          SHOPEE_CSV_URL: ${{ secrets.SHOPEE_CSV_URL }}
        run: python app.py

      - name: Save state
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add state.json || true
          git commit -m "update state" || true
          git push || true
