name: Auto Post

on:
  schedule:
    - cron: "0 2 * * *"
    - cron: "0 5 * * *"
    - cron: "30 8 * * *"
    - cron: "30 11 * * *"
    - cron: "0 14 * * *"
  workflow_dispatch:

jobs:
  autopost:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Run V30 ULTRA FIX
        env:
          GRAPH_VERSION: "v25.0"
          PAGE_ID: ${{ secrets.PAGE_ID }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          SHOPEE_CSV_URL: ${{ secrets.SHOPEE_CSV_URL }}
          SHOPEE_AFFILIATE_ID: "15328100363"
          AFF_UTM_SOURCE: "facebook"
          AFF_TAG: "BENHomeElectrical"
          FIRST_RUN_POST_1: "1"
          POSTS_MAX_PER_RUN: "1"
          SLOTS_BKK: "09:00,12:00,18:30,21:00"
        run: python app.py
