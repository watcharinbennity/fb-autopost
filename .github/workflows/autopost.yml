name: Auto Post

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      max_catchup_per_run:
        description: "How many missed slots to catch up in this run"
        required: false
        default: "1"

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          PAGE_ID: ${{ secrets.PAGE_ID }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          SHOPEE_CSV_URL: ${{ secrets.SHOPEE_CSV_URL }}

          GRAPH_VERSION: "v25.0"

          # เวลาโพสต์ (เวลาไทย)
          POST_SCHEDULE_BKK: "09:00,12:15,15:30,18:30,21:00"

          # โพสต์ชดเชยได้กี่สล็อตต่อการรัน (แนะนำ 1-2 กันสแปม)
          MAX_CATCHUP_PER_RUN: ${{ github.event.inputs.max_catchup_per_run || '1' }}

          # รูปต่อสินค้า (3 รูป)
          POST_IMAGES_COUNT: "3"

          # คัดของดี
          MIN_RATING: "4.5"
          MIN_DISCOUNT_PCT: "20"
          MIN_IMAGES: "3"
          STREAM_SCAN_ROWS: "30000"
          PICK_TOP_N: "400"

          # ทำคอมเมนต์ใต้โพสต์ (ช่วย Reach)
          AUTO_COMMENT: "true"

          # ทำโพสต์แรกทันทีเมื่อรันครั้งแรก
          FIRST_RUN_POST_NOW: "true"

        run: python -u app.py

      - name: Commit state.json back to repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add state.json || true
          git commit -m "update state" || echo "no changes"
          git push || echo "push skipped"
