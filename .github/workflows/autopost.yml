name: Auto Post

on:
  schedule:
    - cron: "15 5 * * *"   # 12:15 Asia/Bangkok
    - cron: "30 11 * * *"  # 18:30 Asia/Bangkok
  workflow_dispatch:
    inputs:
      posts:
        description: "How many posts this run"
        required: false
        default: "1"

concurrency:
  group: fb-autopost
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Auto Post
        env:
          PAGE_ID: ${{ secrets.PAGE_ID }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          SHOPEE_CSV_URL: ${{ secrets.SHOPEE_CSV_URL }}

          POSTS_PER_RUN: ${{ github.event.inputs.posts || '1' }}

          # โหมดโหด
          POST_IMAGES_COUNT: "3"          # 3 รูปต่อโพสต์
          END_MONTH_BOOST_DAYS: "3"       # 3 วันท้ายเดือน เน้นของโปร
          MIN_DISCOUNT_PCT: "10"          # ถ้าเป็นของโปรอย่างน้อยกี่ %
          CSV_TIMEOUT_SEC: "45"           # กันค้างดึง CSV
          CSV_RETRIES: "5"

          GRAPH_VERSION: "v25.0"

        run: python -u app.py

      - name: Commit state.json back to repo
        run: |
          if [ -n "$(git status --porcelain state.json)" ]; then
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git add state.json
            git commit -m "Update state.json"
            git push
          else
            echo "No state changes"
          fi
