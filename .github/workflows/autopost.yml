name: Auto Post

on:
  schedule:
    - cron: "0 2 * * *"   # 09:00 BKK
    - cron: "0 5 * * *"   # 12:00 BKK
    - cron: "30 11 * * *" # 18:30 BKK
    - cron: "0 14 * * *"  # 21:00 BKK
  workflow_dispatch:

jobs:
  autopost:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Run V30 ULTRA
        env:
          GRAPH_VERSION: "v25.0"
          PAGE_ID: ${{ secrets.PAGE_ID }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          SHOPEE_CSV_URL: ${{ secrets.SHOPEE_CSV_URL }}

          # affiliate (ค่าหน้านาย)
          SHOPEE_AFFILIATE_ID: "15328100363"
          AFF_UTM_SOURCE: "facebook"
          AFF_TAG: "BENHomeElectrical"

          # schedule BKK (ในโค้ดเป็นเวลาไทยอยู่แล้ว)
          SLOTS_BKK: "09:00,12:00,18:30,21:00"

          # โพสต์ต่อ 1 run
          POSTS_MAX_PER_RUN: "1"

          # first run ให้โพสต์ 1 ครั้ง
          FIRST_RUN_POST_1: "1"
          FORCE_POST: "0"

          # เน้นหมวดเพจ + กันหลุด
          MIN_RATING: "4.7"
          MIN_DISCOUNT_PCT: "15"
          PRICE_MIN: "59"
          PRICE_MAX: "4999"

        run: python app.py
