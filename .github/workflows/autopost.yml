name: Auto Post

on:
  schedule:
    # เวลาไทย (UTC+7) 12:15 และ 18:30
    # 12:15 BKK = 05:15 UTC
    # 18:30 BKK = 11:30 UTC
    - cron: "15 5 * * *"
    - cron: "30 11 * * *"
  workflow_dispatch:
    inputs:
      posts:
        description: "How many posts this run"
        required: false
        default: "1"

# ถ้ามีส่วนนี้อยู่ ให้ใช้แบบนี้ (อย่า cancel งานที่กำลังรัน)
concurrency:
  group: fb-autopost
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 25   # ✅ สำคัญ: กันโดนตัดที่ ~6 นาที

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Auto Post
        env:
          PAGE_ID: ${{ secrets.PAGE_ID }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          SHOPEE_CSV_URL: ${{ secrets.SHOPEE_CSV_URL }}
          POSTS_THIS_RUN: ${{ github.event.inputs.posts || '1' }}
          GRAPH_VERSION: "v25.0"
          POST_IMAGES_COUNT: "3"
          END_MONTH_BOOST_DAYS: "3"
        run: python -u app.py
