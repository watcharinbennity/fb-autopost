name: Academy Posts

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'    # 10:00 ไทย
    - cron: '30 13 * * *'  # 20:30 ไทย

permissions:
  contents: write

jobs:
  academy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg and fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto-core fonts-noto-extra

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install requests Pillow

      - name: Run academy engine
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          PAGE_ID: ${{ secrets.PAGE_ID }}
        run: python -u academy/academy_engine.py

      - name: Save academy state
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add academy/state.json || true
          git diff --cached --quiet || git commit -m "update academy state"
          git push || echo "no change"
